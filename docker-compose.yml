version: '3.8'

services:
  samba:
    image: dperson/samba

    ports:
      - "1391:139"
      - "4451:445"
    command: [ "-g", "ntlm auth = yes", "-r", "-p", "-u", "user;pass", "-s", "share;/mount;yes;no;no;user" ]
    healthcheck:
      test: [ "CMD-SHELL", "smbstatus" ]
      interval: 10s
      timeout: 5s
      retries: 5
